services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy
    networks: [web]

  app:
    image: ${APP_IMAGE:-claude-commuity:local}
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.claudecommunity.com}
        NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-https://www.claudecommunity.com/stats/script.js}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
        GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
        BING_SITE_VERIFICATION: ${BING_SITE_VERIFICATION:-}
        BAIDU_SITE_VERIFICATION: ${BAIDU_SITE_VERIFICATION:-}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.claudecommunity.com}
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-https://www.claudecommunity.com/stats/script.js}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
      BING_SITE_VERIFICATION: ${BING_SITE_VERIFICATION:-}
      BAIDU_SITE_VERIFICATION: ${BAIDU_SITE_VERIFICATION:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-claude}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-claude_commuity}
      IP_HASH_SALT: ${IP_HASH_SALT:?set IP_HASH_SALT}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [web, data]

  umami:
    image: docker.umami.is/umami-software/umami:postgresql-latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-claude}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:?set UMAMI_APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [web, data]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-claude}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-claude_commuity}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claude} -d ${POSTGRES_DB:-claude_commuity}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [data]

networks:
  web:
  data:
    internal: true

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
